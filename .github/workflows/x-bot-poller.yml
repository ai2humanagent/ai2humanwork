name: X Bot Poller

on:
  schedule:
    # Webhook is primary; polling is the recovery path when X misses a delivery.
    # Empty reads are not billed, and returned mentions use Owned Read pricing.
    - cron: "2-57/5 * * * *"
  workflow_dispatch:
    inputs:
      setup_webhook:
        description: Register and subscribe the production X Account Activity webhook
        required: false
        default: false
        type: boolean

concurrency:
  group: x-bot-poller
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Configure X Account Activity webhook
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.setup_webhook }}
        env:
          CRON_SECRET: ${{ secrets.X_BOT_CRON_SECRET }}
        run: |
          set -euo pipefail
          curl --fail-with-body --silent --show-error \
            --max-time 55 \
            -X POST \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "https://ai2human.io/api/admin/x-webhook/setup" | jq -c .

      - name: Trigger protected X bot worker
        env:
          CRON_SECRET: ${{ secrets.X_BOT_CRON_SECRET }}
        run: |
          set -euo pipefail
          test -n "${CRON_SECRET:-}"

          endpoint="https://ai2human.io/api/cron/x-bot"

          response="$(curl --fail-with-body --silent --show-error \
            --max-time 55 \
            --retry 2 \
            --retry-delay 2 \
            --retry-all-errors \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "${endpoint}")"

          # Always emit a redacted operational summary before enforcing the
          # failure gate so needs_review errors remain diagnosable in Actions.
          echo "${response}" | jq -c '{
            ok,
            dryRun,
            deferred,
            reason,
            retryAt,
            checkedAt,
            mentionsFetched,
            jobsClaimed,
            repliesLast24Hours,
            maxRepliesPerDay,
            results: [.results[]? | {sourceTweetId, intent, status}],
            autoPublishResults: [.autoPublishResults[]? | {
              taskId: .task.id,
              status,
              balance,
              required,
              error,
              txHash
            }]
          }'

          echo "${response}" | jq -ec '
            if .ok != true then error("x bot worker returned ok=false")
            elif .reason == "daily_reply_safety_limit"
              then error("x bot daily reply safety limit reached; queued jobs were deferred")
            elif any(.results[]?; .status == "failed" or .status == "needs_review")
              then error("x bot worker contains failed or ambiguous jobs")
            elif any(.autoPublishResults[]?; .status == "needs_review")
              then error("x bot auto-publish contains a task that needs review")
            else true
            end'
