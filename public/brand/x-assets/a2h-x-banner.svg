    <text x="92" y="146" fill="#F4F6FF" fill-opacity="0.5" font-family="Inter, Sora, Space Grotesk, Arial, sans-serif" font-size="15" font-weight="600">Base USDC rewards</text>
    <text x="92" y="188" fill="#F4F6FF" fill-opacity="0.72" font-family="Inter, Sora, Space Grotesk, Arial, sans-serif" font-size="18" font-weight="700" letter-spacing="2">HUMAN</text>
