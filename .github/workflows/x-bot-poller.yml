name: X Bot Poller

on:
  schedule:
    # Avoid GitHub Actions' busiest minute boundaries while keeping a 5-minute cadence.
    - cron: "2-57/5 * * * *"
  workflow_dispatch:

concurrency:
  group: x-bot-poller
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Trigger protected X bot worker
        env:
          CRON_SECRET: ${{ secrets.X_BOT_CRON_SECRET }}
        run: |
          set -euo pipefail
          test -n "${CRON_SECRET:-}"

          response="$(curl --fail-with-body --silent --show-error \
            --max-time 55 \
            --retry 2 \
            --retry-delay 2 \
            --retry-all-errors \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "https://ai2human.io/api/cron/x-bot")"

          echo "${response}" | jq -c '{
            ok,
            dryRun,
            checkedAt,
            mentionsFetched,
            jobsClaimed,
            results: [.results[]? | {sourceTweetId, intent, status}]
          }'
