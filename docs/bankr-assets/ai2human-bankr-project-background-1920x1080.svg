    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="30" stdDeviation="50" flood-color="#26304D" flood-opacity="0.16"/>
    </filter>
